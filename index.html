<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goblin Empire</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        /* Блокуємо будь-яку прокрутку та фіксуємо висоту */
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; background: #1a1a1a; 
            position: fixed; /* Важливо для мобільних PWA */
        }

        body { color: white; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        
        .ui-header { 
            height: 60px; background: #2c3e50; display: flex; justify-content: space-around; align-items: center; border-bottom: 3px solid #f1c40f; 
            padding-top: env(safe-area-inset-top);
        }
        
        .tabs { display: flex; height: 50px; background: #34495e; }
        .tab-btn { flex: 1; border: none; background: #34495e; color: #bdc3c7; font-weight: bold; }
        .tab-btn.active { background: #27ae60; color: white; }
        
        /* Розраховуємо висоту ігрової зони точно */
        #mine-page, #city-page { 
            width: 100%; 
            height: calc(100% - 110px - env(safe-area-inset-top)); 
            position: relative; 
            display: none; 
        }
        .active-page { display: block !important; }

        canvas { display: block; background: #1e272e; width: 100%; height: 100%; }

        /* НОВА ЛОГІКА КНОПКИ: Використовуємо фіксоване позиціювання */
        .controls { 
            position: fixed; 
            bottom: calc(40px + env(safe-area-inset-bottom)); 
            left: 0;
            width: 100%; 
            display: flex; 
            justify-content: center; 
            z-index: 999;
            pointer-events: none;
        }
        .btn { 
            pointer-events: auto; 
            padding: 18px 35px; 
            border: none; 
            color: white; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 18px;
            background: #e67e22; 
            box-shadow: 0 6px #d35400;
            active { transform: translateY(2px); box-shadow: 0 4px #d35400; }
        }
        
        .village-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; background: #2ecc71; border-radius: 15px; margin: 10px; }
        .plot { aspect-ratio: 1/1; background: #27ae60; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        .lvl-badge { position: absolute; top: 2px; right: 2px; background: #f1c40f; color: black; font-size: 10px; padding: 1px 4px; border-radius: 4px; }

        #build-menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #34495e; padding: 20px; border-radius: 15px; border: 3px solid #f1c40f;
            display: none; z-index: 1000; width: 260px; box-shadow: 0 0 100px black; text-align: center;
        }
        .build-opt { background: #2c3e50; padding: 12px; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="ui-header">
    <div>💰 <span id="gold">200</span></div>
    <div>⚒️ <span id="speed-bonus">100</span>%</div>
    <div>Lvl: <span id="level-num">1</span></div>
</div>

<div class="tabs">
    <button id="t-mine" class="tab-btn active" onclick="showPage('mine')">⚒️ ШАХТА</button>
    <button id="t-city" class="tab-btn" onclick="showPage('city')">🏘️ МІСТО</button>
</div>

<div id="mine-controls" class="controls">
    <button onclick="buyGoblin()" class="btn">🧌 Наняти (+50💰)</button>
</div>

<div id="mine-page" class="active-page">
    <canvas id="gameCanvas"></canvas>
</div>

<div id="city-page">
    <div class="village-grid" id="village"></div>
    <div id="build-menu" onclick="event.stopPropagation()">
        <h3 id="menu-title">Будівництво</h3>
        <div id="options-container"></div>
        <button onclick="closeMenu()" style="width:100%; margin-top:10px; background:#e74c3c; border:none; color:white; padding:8px; border-radius:5px;">Закрити</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gold = 200, level = 1, map = [], goblins = [], draggedG = null, selectedPlot = null;
    let villageData = Array(16).fill(null).map(() => ({type:'empty', icon:'🟫', lvl: 0}));
    let lastTime = Date.now();

    function resize() {
        const page = document.getElementById('mine-page');
        canvas.width = window.innerWidth;
        canvas.height = page.offsetHeight;
    }
    
    // Слідкуємо за зміною орієнтації та розміру
    window.addEventListener('resize', () => { setTimeout(resize, 200); });
    window.addEventListener('load', () => { setTimeout(resize, 200); });

    function save() {
        const data = { gold, level, goblins: goblins.map(g=>({x:g.x, y:g.y, lvl:g.lvl})), villageData };
        localStorage.setItem('goblin_master_pwa', JSON.stringify(data));
    }

    function load() {
        const s = localStorage.getItem('goblin_master_pwa');
        if(s) {
            const d = JSON.parse(s);
            gold = d.gold; level = d.level; villageData = d.villageData;
            goblins = d.goblins.map(g => new Goblin(g.x, g.y, g.lvl));
        }
        updateStats();
    }

    function showPage(p) {
        document.getElementById('mine-page').className = p==='mine'?'active-page':'';
        document.getElementById('city-page').className = p==='city'?'active-page':'';
        document.getElementById('t-mine').className = 'tab-btn ' + (p==='mine'?'active':'');
        document.getElementById('t-city').className = 'tab-btn ' + (p==='city'?'active':'');
        
        // Показуємо кнопку лише на сторінці шахти
        document.getElementById('mine-controls').style.display = p==='mine' ? 'flex' : 'none';
        
        if(p==='city') renderVillage();
        setTimeout(resize, 50);
    }

    // Решта логіки (renderVillage, openBuildMenu, initLevel, Goblin class тощо) залишається без змін
    // але я додав прискорення, яке ми обговорювали:

    function getSpeedBonus() {
        let forests = villageData.filter(p => p.type === 'forest');
        return 1 + (forests.reduce((sum, p) => sum + p.lvl, 0) * 0.1);
    }

    setInterval(() => {
        let gardens = villageData.filter(p => p.type === 'garden');
        let income = gardens.reduce((sum, p) => sum + (p.lvl * 5), 0);
        if (income > 0) { gold += income; updateStats(); }
    }, 10000);

    function renderVillage() {
        const v = document.getElementById('village'); v.innerHTML = '';
        villageData.forEach((p, i) => {
            const d = document.createElement('div'); 
            d.className = 'plot'; 
            d.innerHTML = p.icon + (p.lvl > 0 ? `<div class="lvl-badge">L${p.lvl}</div>` : '');
            d.onclick = () => openBuildMenu(i);
            v.appendChild(d);
        });
    }

    function openBuildMenu(index) {
        selectedPlot = index;
        const plot = villageData[index];
        const menu = document.getElementById('build-menu');
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        if (plot.type === 'empty') {
            addOption(container, '🌲 Ліс', 200, () => confirmBuild('🌲', 200, 'forest', 1));
            addOption(container, '🍅 Город', 150, () => confirmBuild('🍅', 150, 'garden', 1));
        } else {
            const upCost = plot.lvl * 300;
            addOption(container, `⬆️ Рівень ${plot.lvl + 1}`, upCost, () => confirmBuild(plot.icon, upCost, plot.type, plot.lvl + 1));
        }
        menu.style.display = 'block';
    }

    function addOption(parent, name, cost, action) {
        const div = document.createElement('div');
        div.className = 'build-opt';
        div.innerHTML = `<span>${name}</span> <span>💰${cost}</span>`;
        div.onclick = action;
        parent.appendChild(div);
    }

    function confirmBuild(icon, cost, type, newLvl) {
        if(gold >= cost) { gold -= cost; villageData[selectedPlot] = { type, icon, lvl: newLvl }; closeMenu(); renderVillage(); updateStats(); save(); }
        else alert("Бракує золота!");
    }
    function closeMenu() { document.getElementById('build-menu').style.display='none'; }

    function initLevel() {
        map = [];
        const types = [{ icon:'🪨', min:30, max:60, r:50 }, { icon:'🪙', min:200, max:500, r:300 }, { icon:'🔵', min:600, max:1200, r:1500 }, { icon:'🟡', min:1800, max:3600, r:5000 }];
        let cols = Math.floor(canvas.width / 90);
        for (let i = 0; i < (cols * 5); i++) {
            let rand = Math.random(), t = types[0];
            if (rand > 0.6) t = types[1]; if (rand > 0.85) t = types[2]; if (rand > 0.96) t = types[3];
            let dur = t.min + Math.random() * (t.max - t.min);
            map.push({ x: (i % cols) * 90 + 15, y: Math.floor(i / cols) * 85 + 30, totalTime: dur, remaining: dur, reward: Math.floor(t.r * level), icon: t.icon, active: true });
        }
        document.getElementById('level-num').innerText = level;
    }

    class Goblin {
        constructor(x, y, lvl) { this.x = x; this.y = y; this.lvl = lvl; this.target = null; }
        update(dt) {
            if (this.isDragging) return;
            if (this.target && this.target.active) {
                let power = (2.0 + (this.lvl - 1) * 1.0) * getSpeedBonus();
                this.target.remaining -= (dt / 1000) * power;
                if (this.target.remaining <= 0) {
                    gold += this.target.reward; this.target.active = false; this.target = null;
                    if (map.every(m => !m.active)) { level++; initLevel(); }
                    updateStats(); save();
                }
            }
        }
        draw() {
            ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText("🧌", this.x, this.y);
            if (this.target && this.target.active) {
                let prg = 1 - (this.target.remaining / this.target.totalTime);
                ctx.beginPath(); ctx.arc(this.x, this.y - 15, 25, 0, Math.PI * 2 * prg);
                ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 4; ctx.stroke();
                let s = Math.max(0, Math.floor(this.target.remaining));
                ctx.fillStyle = "white"; ctx.font = "bold 10px monospace";
                ctx.fillText(`${Math.floor(s/60)}хв ${s%60}с`, this.x, this.y + 25);
            } else if (!this.isDragging) {
                ctx.fillStyle = "#e74c3c"; ctx.font = "bold 10px Arial"; ctx.fillText("ЧЕКАЄ", this.x, this.y + 20);
            }
            ctx.fillStyle = "#f1c40f"; ctx.font = "bold 12px Arial"; ctx.fillText("L" + this.lvl, this.x, this.y - 42);
        }
    }

    function getPos(e) { let t = e.touches ? e.touches[0] : e; let r = canvas.getBoundingClientRect(); return { x: t.clientX - r.left, y: t.clientY - r.top }; }
    function start(e) { let p = getPos(e); draggedG = goblins.find(g => Math.hypot(g.x - p.x, g.y - p.y) < 40); if(draggedG) draggedG.isDragging = true; }
    function move(e) { if(draggedG) { let p = getPos(e); draggedG.x = p.x; draggedG.y = p.y; if(e.touches) e.preventDefault(); } }
    function end() {
        if(draggedG) {
            draggedG.isDragging = false;
            let other = goblins.find(g => g !== draggedG && Math.hypot(g.x - draggedG.x, g.y - draggedG.y) < 40);
            if(other && other.lvl === draggedG.lvl) { other.lvl++; goblins = goblins.filter(g => g !== draggedG); }
            else { 
                let b = map.find(m => m.active && Math.hypot(m.x+30-draggedG.x, m.y+30-draggedG.y) < 60);
                if(b) { draggedG.target = b; draggedG.x = b.x + 30; draggedG.y = b.y + 40; }
            }
            draggedG = null; save();
        }
    }

    canvas.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', end);

    function buyGoblin() { if(gold >= 50) { gold -= 50; goblins.push(new Goblin(canvas.width/2, canvas.height/2, 1)); updateStats(); save(); } }
    function updateStats() { document.getElementById('gold').innerText = Math.floor(gold); document.getElementById('speed-bonus').innerText = Math.round(getSpeedBonus() * 100); }

    function loop() {
        let now = Date.now(), dt = now - lastTime; lastTime = now;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        map.forEach(m => { if(m.active) { ctx.font = "35px Arial"; ctx.textAlign = "left"; ctx.fillText(m.icon, m.x, m.y + 40); }});
        goblins.forEach(g => { g.update(dt); g.draw(); });
        requestAnimationFrame(loop);
    }

    load(); if(map.length === 0) initLevel(); loop();
</script>
</body>
</html>
